<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta name="theme-color" content="#1b0b07">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Arcano">
<link rel="icon" type="image/png" href="icons/favicon.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Arcano — Cómplice del Sabor</title>
<link rel="manifest" href="manifest.json?v=30">
<link rel="stylesheet" href="css/style.css?v=30">
</head>
<body>

<!-- ========== STOREFRONT (public) ========== -->
<div id="storefront" style="display:none">
  <header id="store-header">
    <div class="store-header-inner">
      <div class="store-brand">
        <span class="store-logo-text">ARCANO</span>
        <span class="store-sub">Cómplice del Sabor</span>
      </div>
      <div class="store-actions">
        <button class="btn btn-ghost btn-sm" onclick="showLogin()" id="store-login-btn">Ingresar</button>
        <button class="btn btn-gold btn-sm cart-toggle" onclick="toggleCart()" id="cart-btn">
          Carrito <span id="cart-count" class="cart-count" style="display:none">0</span>
        </button>
      </div>
    </div>
  </header>
  <nav id="store-nav">
    <button class="store-nav-btn active" data-cat="todos">Todos</button>
    <button class="store-nav-btn" data-cat="especias">Especias</button>
    <button class="store-nav-btn" data-cat="blends">Blends</button>
  </nav>
  <div id="store-hero">
    <h1 class="hero-title">ARCANO</h1>
    <p class="hero-sub">Especias y blends artesanales</p>
  </div>
  <main id="store-main">
    <div id="store-products" class="products-grid"></div>
    <div id="store-empty" class="empty" style="display:none">
      <div class="empty-icon">🧂</div>
      <p>No hay productos disponibles aún</p>
    </div>
  </main>

  <!-- Cart Drawer -->
  <div id="cart-overlay" class="cart-overlay" onclick="toggleCart()"></div>
  <div id="cart-drawer" class="cart-drawer">
    <div class="cart-header">
      <h3>Tu Carrito</h3>
      <button class="modal-close" onclick="toggleCart()">&times;</button>
    </div>
    <div id="cart-items" class="cart-items"></div>
    <div id="cart-footer" class="cart-footer" style="display:none">
      <div class="cart-total">Total: <strong id="cart-total-val">$0</strong></div>
      <button class="btn btn-gold btn-full" onclick="showCheckout()">Finalizar Compra</button>
    </div>
  </div>
</div>

<!-- ========== PIN SCREEN ========== -->
<div id="pin-screen" style="display:flex">
  <div id="pin-content"></div>
</div>

<!-- ========== ADMIN APP ========== -->
<div id="admin-app" style="display:none">
  <header id="app-header">
    <div class="header-logo">
      <img src="icons/logo-header.png" alt="Arcano" onerror="this.style.display='none'">
      <div>
        <div class="header-brand">ARCANO</div>
        <div class="header-sub">Cómplice del Sabor</div>
      </div>
    </div>
    <div class="header-pin">
      <span id="gh-status-badge" class="badge bg">Conectado</span>
      <div class="user-chip" onclick="handleLogout()" id="user-chip" title="Cerrar sesión"></div>
    </div>
  </header>
  <nav id="app-nav"></nav>
  <main id="app-main">
    <div id="page-dashboard" class="page"></div>
    <div id="page-compras" class="page"></div>
    <div id="page-productos" class="page"></div>
    <div id="page-blends" class="page"></div>
    <div id="page-ventas" class="page"></div>
    <div id="page-usuarios" class="page"></div>
    <div id="page-ajustes" class="page"></div>
  </main>
</div>

<!-- ========== MODAL ========== -->
<div id="modal-overlay" class="modal-overlay" onclick="closeModal()">
  <div class="modal" id="modal-body" onclick="event.stopPropagation()"></div>
</div>

<!-- ========== TOAST ========== -->
<div id="toast"></div>

<!-- ========== PWA BANNER ========== -->
<div id="pwa-banner" style="display:none">
  <div class="pwa-banner-inner">
    <img src="icons/icon-192.png" alt="" style="width:40px;height:40px;border-radius:8px">
    <div class="pwa-banner-text">
      <div class="fw7 text-sm">Instalar Arcano</div>
      <div class="text-xs text-muted">Acceso rápido desde tu pantalla de inicio</div>
    </div>
    <button class="btn btn-gold btn-sm" onclick="installPWA()">Instalar</button>
    <button class="btn btn-ghost btn-sm" onclick="dismissPWA()" style="padding:5px 8px;font-size:.9rem">x</button>
  </div>
</div>

<!-- ========== SCRIPTS ========== -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="js/db.js?v=30"></script>
<script src="js/firebase-sync.js?v=30"></script>
<script src="js/core.js?v=30"></script>
<script src="js/pages.js?v=30"></script>
</body>
</html>
